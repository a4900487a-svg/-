<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>平鎮高中 升學輔導專區</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Nunito:wght@800;900&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #1AABB8;
  --primary-light: #B9F0ED;
  --accent: #69A0F0;
  --accent2: #69F08F;
  --accent3: #69CBF0;
  --accent4: #69F0EA;
  --mint: #C9F5E4;
  --bg: #EBF9F8;
  --sidebar-bg: #0E3A3D;
  --sidebar-w: 260px;
  --white: #fff;
  --text: #0D2B2D;
  --muted: #4A7A7D;
  --border: #B9F0ED;
  --radius: 14px;
  --shadow: 0 2px 16px rgba(26,171,184,0.13);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ========== SIDEBAR ========== */
.sidebar {
  width: var(--sidebar-w);
  background: var(--sidebar-bg);
  height: 100vh;
  position: fixed;
  left: 0; top: 0;
  display: flex;
  flex-direction: column;
  z-index: 50;
  transition: transform 0.3s cubic-bezier(.4,0,.2,1);
  overflow: hidden;
}

.sidebar-logo {
  padding: 22px 22px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  flex-shrink: 0;
}
.logo-badge {
  background: linear-gradient(135deg, #1AABB8, #69CBF0);
  color: #fff;
  font-family: 'Nunito', 'Noto Sans TC', sans-serif;
  font-weight: 900;
  font-size: 20px;
  padding: 6px 14px;
  border-radius: 10px;
  display: inline-block;
  margin-bottom: 6px;
  letter-spacing: -0.5px;
}
.sidebar-subtitle {
  color: rgba(255,255,255,0.35);
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

/* 首頁按鈕 */
.home-btn {
  margin: 12px 16px 0;
  display: flex; align-items: center; gap: 8px;
  padding: 9px 14px;
  background: rgba(105,240,234,0.12);
  border: 1.5px solid rgba(105,240,234,0.25);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
  flex-shrink: 0;
}
.home-btn:hover {
  background: rgba(105,240,234,0.22);
  border-color: rgba(105,240,234,0.5);
}
.home-btn-icon { font-size: 16px; }
.home-btn-text { font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.85); }

/* 可捲動的中間區域 */
.sidebar-scroll {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.15) transparent;
}
.sidebar-scroll::-webkit-scrollbar { width: 4px; }
.sidebar-scroll::-webkit-scrollbar-track { background: transparent; }
.sidebar-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
.sidebar-scroll::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }

.sidebar-nav { padding: 12px 0; }

.nav-section { margin-bottom: 6px; }

.nav-section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 22px;
  cursor: pointer;
  border-radius: 0;
  transition: background 0.2s;
  user-select: none;
  position: relative;
}
.nav-section-header:hover { background: rgba(255,255,255,0.05); }
.nav-section-header.active { background: rgba(26,171,184,0.22); }

.nav-section-label {
  display: flex; align-items: center; gap: 10px;
  font-size: 13px; font-weight: 700;
  color: rgba(255,255,255,0.85);
}
.nav-icon {
  width: 30px; height: 30px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  flex-shrink: 0;
}
.icon-blue   { background: rgba(105,203,240,0.25); }
.icon-orange { background: rgba(105,160,240,0.25); }
.icon-green  { background: rgba(105,240,143,0.25); }
.icon-purple { background: rgba(105,240,234,0.25); }
.icon-pink   { background: rgba(185,240,237,0.30); }

.chevron {
  color: rgba(255,255,255,0.3);
  font-size: 11px;
  transition: transform 0.25s;
}
.nav-section.open .chevron { transform: rotate(90deg); }

.nav-dropdown {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
}
.nav-section.open .nav-dropdown { max-height: 400px; }

.nav-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 22px 8px 62px;
  font-size: 12.5px;
  color: rgba(255,255,255,0.5);
  cursor: pointer;
  transition: all 0.2s;
  border-left: 2px solid transparent;
  text-decoration: none;
}
.nav-item:hover { color: #fff; background: rgba(255,255,255,0.05); }
.nav-item.active {
  color: #fff;
  background: rgba(26,171,184,0.18);
  border-left-color: var(--accent3);
}
.nav-item-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: currentColor;
  flex-shrink: 0;
}

/* Documents section */
.doc-section { padding: 16px 22px; border-top: 1px solid rgba(255,255,255,0.07); }
.doc-section-title {
  font-size: 10px; font-weight: 700; letter-spacing: 2px;
  color: rgba(255,255,255,0.3); text-transform: uppercase;
  margin-bottom: 10px;
}
.doc-link {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 12px;
  border-radius: 8px;
  background: rgba(255,255,255,0.05);
  margin-bottom: 6px;
  text-decoration: none;
  transition: background 0.2s;
  cursor: pointer;
}
.doc-link:hover { background: rgba(255,255,255,0.10); }
.doc-link-icon { font-size: 16px; }
.doc-link-text { font-size: 12px; color: rgba(255,255,255,0.7); font-weight: 500; line-height: 1.3; }
.doc-link-badge {
  margin-left: auto;
  font-size: 9px; font-weight: 700;
  background: var(--accent);
  color: #fff;
  padding: 2px 6px;
  border-radius: 4px;
  white-space: nowrap;
}

/* ========== MAIN ========== */
.main {
  margin-left: var(--sidebar-w);
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* === TOPBAR === */
.topbar {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 16px 32px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky; top: 0; z-index: 40;
}
.menu-toggle {
  display: none;
  background: none; border: none;
  font-size: 22px; cursor: pointer;
  color: var(--text);
}
.topbar-title {
  font-weight: 900;
  font-size: 17px;
  color: var(--text);
  white-space: nowrap;
}
.topbar-title span { color: var(--primary); }

.search-wrap {
  flex: 1;
  position: relative;
  max-width: 480px;
}
.search-wrap input {
  width: 100%;
  padding: 10px 18px 10px 44px;
  border-radius: 999px;
  border: 2px solid var(--border);
  background: var(--bg);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 14px;
  color: var(--text);
  outline: none;
  transition: border 0.2s, box-shadow 0.2s;
}
.search-wrap input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(26,171,184,0.15);
  background: #fff;
}
.search-icon {
  position: absolute; left: 16px; top: 50%;
  transform: translateY(-50%); font-size: 16px; pointer-events: none;
}

.view-toggle {
  display: flex; gap: 4px;
  background: var(--bg); border-radius: 8px; padding: 4px;
}
.vbtn {
  width: 32px; height: 32px;
  border-radius: 6px; border: none;
  background: transparent; cursor: pointer;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; color: var(--muted);
}
.vbtn.active { background: var(--white); color: var(--primary); box-shadow: 0 1px 4px rgba(0,0,0,0.10); }

.sheet-btn {
  padding: 8px 16px;
  background: var(--primary);
  color: #fff;
  border: none; border-radius: 8px;
  font-size: 12px; font-weight: 700;
  font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer;
  white-space: nowrap;
  transition: opacity 0.2s;
}
.sheet-btn:hover { opacity: 0.85; }

/* === BREADCRUMB === */
.breadcrumb {
  padding: 14px 32px 0;
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--muted);
}
.breadcrumb span { color: var(--primary); font-weight: 700; }

/* === FILTER CHIPS === */
.filter-bar {
  padding: 14px 32px;
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.chip {
  padding: 5px 14px;
  border-radius: 999px;
  border: 1.5px solid var(--border);
  background: var(--white);
  font-size: 12px; font-weight: 700;
  font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--muted);
}
.chip:hover { border-color: var(--primary); color: var(--primary); }
.chip.active {
  background: var(--primary);
  border-color: var(--primary);
  color: #fff;
}
.result-count {
  margin-left: auto;
  font-size: 12px; color: var(--muted);
}

/* === CONTENT AREA === */
.content { padding: 4px 32px 48px; }

/* LIST VIEW */
.list-view { display: flex; flex-direction: column; gap: 8px; }
.list-item {
  background: var(--white);
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
  padding: 16px 20px;
  display: flex; align-items: center; gap: 16px;
  cursor: pointer;
  transition: all 0.2s;
  animation: slideIn 0.35s ease both;
}
@keyframes slideIn { from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);} }
.list-item:hover {
  border-color: var(--primary);
  box-shadow: var(--shadow);
  transform: translateX(4px);
}
.list-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}
.list-title {
  flex: 1; font-size: 14px; font-weight: 700; color: var(--text);
  line-height: 1.4;
}
.list-meta {
  display: flex; align-items: center; gap: 12px; flex-shrink: 0;
  flex-wrap: wrap; justify-content: flex-end;
}
.list-cat {
  font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 999px;
}
.list-date { font-size: 12px; color: var(--muted); }
.list-tag {
  font-size: 11px; font-weight: 700;
  padding: 3px 10px; border-radius: 999px;
}
.tag-new    { background: #B9F0ED; color: #0A6E70; }
.tag-hot    { background: #C9F5E4; color: #0D6E45; }
.tag-urgent { background: #D0F5FB; color: #0A5E70; }
.tag-normal { background: var(--bg); color: var(--muted); }

/* CARD VIEW */
.card-view {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}
.card {
  background: var(--white);
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
  overflow: hidden;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(.34,1.56,.64,1);
  animation: cardIn 0.4s ease both;
}
@keyframes cardIn { from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);} }
.card:hover { transform: translateY(-5px); box-shadow: 0 12px 40px rgba(26,171,184,0.18); border-color: var(--primary); }
.card-top { height: 5px; }
.card-body { padding: 18px 20px; }
.card-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.card-cat { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 999px; }
.card-h { font-size: 15px; font-weight: 700; line-height: 1.5; color: var(--text); margin-bottom: 8px; }
.card-desc { font-size: 12px; color: var(--muted); line-height: 1.6; margin-bottom: 14px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-footer-row { display: flex; align-items: center; justify-content: space-between; }
.card-date { font-size: 11px; color: var(--muted); }
.card-arrow {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--primary-light); color: var(--primary);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700;
  transition: background 0.2s, color 0.2s;
}
.card:hover .card-arrow { background: var(--primary); color: #fff; }

/* EMPTY */
.empty-state {
  text-align: center; padding: 80px 20px;
  color: var(--muted);
}
.empty-emoji { font-size: 52px; margin-bottom: 12px; }
.empty-state h3 { font-size: 16px; margin-bottom: 6px; color: var(--text); }

/* === MODAL === */
.overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(14,58,61,0.65);
  backdrop-filter: blur(5px);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
}
.overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: #fff;
  border-radius: 20px;
  max-width: 560px; width: 100%;
  max-height: 88vh; overflow-y: auto;
  transform: translateY(28px) scale(0.97);
  transition: transform 0.35s cubic-bezier(.34,1.56,.64,1);
}
.overlay.open .modal { transform: none; }
.modal-stripe { height: 6px; border-radius: 20px 20px 0 0; }
.modal-inner { padding: 28px 30px; }
.modal-kv { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.modal-title { font-size: 20px; font-weight: 900; line-height: 1.35; color: var(--text); margin-bottom: 18px; }
.modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
.modal-cell {
  background: var(--bg); border-radius: 10px; padding: 12px 14px;
}
.modal-cell-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.modal-cell-val { font-size: 14px; font-weight: 700; color: var(--text); }
.modal-content-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.modal-content-body {
  background: var(--bg); border-radius: 10px;
  padding: 14px 16px; font-size: 14px; line-height: 1.8;
  color: var(--text); margin-bottom: 22px;
}
.modal-btn-row { display: flex; gap: 10px; }
.btn-primary {
  flex: 1; padding: 13px;
  background: var(--primary); color: #fff;
  border: none; border-radius: 999px;
  font-size: 14px; font-weight: 700;
  font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer; transition: opacity 0.2s;
}
.btn-primary:hover { opacity: 0.85; }
.btn-outline {
  padding: 13px 20px;
  background: transparent;
  border: 2px solid var(--border);
  border-radius: 999px;
  font-size: 13px; font-weight: 700;
  font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer; color: var(--muted);
  transition: all 0.2s;
}
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }

/* === ADMIN MODALS (動態建立，不內嵌 HTML) === */
.pwd-overlay,
.sheet-overlay {
  position: fixed; inset: 0;
  background: rgba(14,58,61,0.75);
  backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
  z-index: 400;
}
.pwd-overlay.open,
.sheet-overlay.open { opacity: 1; pointer-events: all; z-index: 400; }
.pwd-modal {
  background: #fff; border-radius: 20px;
  max-width: 380px; width: 100%;
  padding: 32px;
  transform: translateY(20px) scale(0.97);
  transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
  text-align: center;
}
.pwd-overlay.open .pwd-modal { transform: none; }
.pwd-lock { font-size: 42px; margin-bottom: 12px; }
.pwd-modal h2 { font-size: 18px; font-weight: 900; color: var(--text); margin-bottom: 6px; }
.pwd-modal p { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
.pwd-input {
  width: 100%; padding: 12px 16px;
  border: 2px solid var(--border); border-radius: 10px;
  font-size: 15px; font-family: "Noto Sans TC", sans-serif;
  outline: none; margin-bottom: 8px; color: var(--text);
  text-align: center; letter-spacing: 3px;
  transition: border 0.2s;
}
.pwd-input:focus { border-color: var(--primary); }
.pwd-error {
  font-size: 12px; color: #e64980; margin-bottom: 12px;
  min-height: 18px; font-weight: 700;
}
.pwd-btns { display: flex; gap: 8px; }
.sheet-modal {
  background: #fff; border-radius: 20px;
  max-width: 520px; width: 100%;
  padding: 32px;
  transform: translateY(20px); transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
}
.sheet-overlay.open .sheet-modal { transform: none; }
.sheet-modal h2 { font-size: 18px; font-weight: 900; margin-bottom: 6px; color: var(--text); }
.sheet-modal p { font-size: 13px; color: var(--muted); margin-bottom: 20px; line-height: 1.6; }
.sheet-modal label { font-size: 12px; font-weight: 700; color: var(--text); display: block; margin-bottom: 6px; }
.sheet-modal input {
  width: 100%; padding: 10px 14px;
  border: 2px solid var(--border); border-radius: 10px;
  font-size: 13px; font-family: 'Noto Sans TC', sans-serif;
  outline: none; margin-bottom: 14px; color: var(--text);
  transition: border 0.2s;
}
.sheet-modal input:focus { border-color: var(--primary); }
.sheet-note {
  background: var(--primary-light);
  border-radius: 10px; padding: 12px 14px;
  font-size: 12px; color: #0A6E70; line-height: 1.7;
  margin-bottom: 20px;
}
.sheet-note strong { font-weight: 900; }
.sheet-btns { display: flex; gap: 10px; }

/* LOADING */
.loading-wrap { display: flex; justify-content: center; align-items: center; padding: 60px; gap: 8px; }
.ldot { width: 10px; height: 10px; border-radius: 50%; animation: bounce 1s ease infinite; }
.ldot:nth-child(1){background:var(--primary);animation-delay:0s;}
.ldot:nth-child(2){background:var(--accent);animation-delay:.15s;}
.ldot:nth-child(3){background:var(--accent2);animation-delay:.3s;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}

/* === MOBILE === */
.sidebar-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 49;
  background: rgba(0,0,0,0.5);
}
@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay.open { display: block; }
  .main { margin-left: 0; }
  .menu-toggle { display: block; }
  .topbar { padding: 14px 16px; }
  .topbar-title { display: none; }
  .content { padding: 4px 16px 48px; }
  .filter-bar { padding: 14px 16px; }
  .breadcrumb { padding: 14px 16px 0; }
  .modal-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- Sidebar Overlay (mobile) -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- ========== SIDEBAR ========== -->
<aside class="sidebar" id="sidebar">
  <!-- Logo 固定頂部 -->
  <div class="sidebar-logo">
    <div class="logo-badge">🎓 平鎮高中 升學輔導專區</div>
    <div class="sidebar-subtitle">平鎮高中 · 升學輔導專區</div>
  </div>

  <!-- 首頁按鈕 -->
  <div class="home-btn" onclick="goHome()">
    <span class="home-btn-icon">🏠</span>
    <span class="home-btn-text">回首頁（所有公告）</span>
  </div>

  <!-- 可上下滑動的區域 -->
  <div class="sidebar-scroll">
  <nav class="sidebar-nav">

    <!-- 所有公告 -->
    <div class="nav-section" id="sec-all">
      <div class="nav-section-header" onclick="filterBy('all',''); setActiveHeader(this)">
        <div class="nav-section-label">
          <div class="nav-icon icon-purple">📋</div>所有公告
        </div>
      </div>
    </div>

    <!-- 升學管道 -->
    <div class="nav-section open" id="sec-pathway">
      <div class="nav-section-header active" onclick="toggleSection('pathway')">
        <div class="nav-section-label">
          <div class="nav-icon icon-blue">🛤️</div>升學管道
        </div>
        <span class="chevron">▶</span>
      </div>
      <div class="nav-dropdown" id="pathwayList">
        <div style="padding:8px 22px 8px 62px;font-size:12px;color:rgba(255,255,255,0.3);">載入中…</div>
      </div>
    </div>

    <!-- 考試相關 -->
    <div class="nav-section" id="sec-exam">
      <div class="nav-section-header" onclick="toggleSection('exam')">
        <div class="nav-section-label">
          <div class="nav-icon icon-green">📝</div>考試相關
        </div>
        <span class="chevron">▶</span>
      </div>
      <div class="nav-dropdown" id="examList">
        <div style="padding:8px 22px 8px 62px;font-size:12px;color:rgba(255,255,255,0.3);">載入中…</div>

function getFiltered() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  return allData.filter(d => {
    if (currentFilter.type === 'category' && d.分類 !== currentFilter.value) return false;
    if (tagFilter !== '全部' && d.標籤 !== tagFilter) return false;
    if (q && !d.標題.toLowerCase().includes(q) && !(d.內容說明||'').toLowerCase().includes(q) && !(d.分類||'').toLowerCase().includes(q)) return false;

  if (viewMode === 'list') {
    content.innerHTML = `<div class="list-view">${filtered.map((d,i) => renderListItem(d,i)).join('')}</div>`;
  } else {
    content.innerHTML = `<div class="card-view">${filtered.map((d,i) => renderCard(d,i)).join('')}</div>`;

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));

}

  sheetOverlay.className = 'sheet-overlay';
  sheetOverlay.id = 'sheetOverlay';
  sheetOverlay.innerHTML = `
    <div class="sheet-modal">
      <h2>⚙️ 設定 Google Sheets 資料來源</h2>
      <p>網站已內建你的試算表，直接更新 Sheets 內容即可同步。<br>如需切換到其他試算表，請貼上新的 Sheets 網址。</p>
      <div class="sheet-note">
        <strong>📌 重要：試算表需設為「知道連結的人都能檢視」</strong><br>
        Sheets → 右上角「共用」→「知道連結的人」→「檢視者」<br><br>
        <strong>欄位格式（第一列為標題）：</strong><br>
        標題 ｜ 分類 ｜ 標籤（最新/重要/緊急） ｜ 日期 ｜ 發布單位 ｜ 內容說明 ｜ 相關連結<br><br>
        <strong>其他分頁：</strong>「文件區」「網站連結」「心理測驗」（欄位：名稱｜網址）
      </div>
      <label>切換到其他試算表（選填，留空使用目前已設定的）</label>
      <input type="text" id="sheetUrlInput" placeholder="https://docs.google.com/spreadsheets/d/...">
      <div class="sheet-btns">
        <button class="btn-primary" id="sheetLoadBtn">載入資料</button>
        <button class="btn-outline" id="sheetDemoBtn">使用示範資料</button>
        <button class="btn-outline" id="sheetCancelBtn">取消</button>
      </div>
    </div>`;
  document.body.appendChild(sheetOverlay);
  sheetOverlay.addEventListener('click', e => { if (e.target === sheetOverlay) closeSheetOverlayDirect(); });
  document.getElementById('sheetLoadBtn').addEventListener('click', loadSheetData);
  document.getElementById('sheetDemoBtn').addEventListener('click', () => { loadDemo(); closeSheetOverlayDirect(); });
  document.getElementById('sheetCancelBtn').addEventListener('click', closeSheetOverlayDirect);
}

function openSheetConfig() {
  buildAdminUI();
  document.getElementById('pwdInput').value = '';
  document.getElementById('pwdError').textContent = '';
  document.getElementById('pwdOverlay').classList.add('open');
  setTimeout(() => document.getElementById('pwdInput').focus(), 300);
}

async function checkPwd() {
  const val = document.getElementById('pwdInput').value;
  const hash = await sha256(val);
  if (hash === ADMIN_PWD_HASH) {
    document.getElementById('pwdOverlay').classList.remove('open');
    document.getElementById('sheetOverlay').classList.add('open');
    document.getElementById('pwdError').textContent = '';
  } else {
    document.getElementById('pwdError').textContent = '❌ 密碼錯誤，請再試一次';
    document.getElementById('pwdInput').value = '';
    document.getElementById('pwdInput').focus();
  }
}

function closePwd() {
  document.getElementById('pwdOverlay').classList.remove('open');
  document.getElementById('pwdInput').value = '';
  document.getElementById('pwdError').textContent = '';
}
function closeSheetOverlayDirect() { document.getElementById('sheetOverlay').classList.remove('open'); }

// 快捷鍵 Ctrl+Shift+A 開啟管理員設定
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.shiftKey && e.key === 'A') openSheetConfig();
});

// 用 Apps Script 當橋樑載入（解決 CORS 問題）
function loadFromAppsScript(url) {
  return new Promise((resolve, reject) => {
    const callbackName = 'gsCallback_' + Date.now();
    const script = document.createElement('script');
    const timer = setTimeout(() => {
      delete window[callbackName];
      if (document.body.contains(script)) document.body.removeChild(script);
      reject(new Error('Timeout'));
    }, 10000);
    window[callbackName] = (data) => {
      clearTimeout(timer);
      delete window[callbackName];
      if (document.body.contains(script)) document.body.removeChild(script);
      resolve(data); // data 可能是 array 或 {announcements, docs}
    };
    script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + callbackName;
    script.onerror = () => { clearTimeout(timer); reject(new Error('Script error')); };
    document.body.appendChild(script);
  });
}

// 解析回傳資料
function parseSheetResponse(data) {
  if (Array.isArray(data)) {
    return { announcements: data, docs: [], links: [], psychLinks: [], menuSettings: [] };
  }
  return {
    announcements: data.announcements || [],
    docs: data.docs || [],
    links: data.links || [],
    psychLinks: data.psychLinks || [],
    menuSettings: data.menuSettings || []
  };
}

// 渲染選單設定（升學管道 & 考試相關）
function renderMenuSettings(settings) {
  const pathway = settings.filter(d => String(d['區塊']).trim() === '升學管道');
  const exam    = settings.filter(d => String(d['區塊']).trim() === '考試相關');

  function buildItems(list, containerId) {
    const container = document.getElementById(containerId);
    if (!container) return;
    if (!list || list.length === 0) {
      container.innerHTML = `<div style="padding:8px 22px 8px 62px;font-size:12px;color:rgba(255,255,255,0.3);">尚無項目</div>`;
      return;
    }
    container.innerHTML = list.map(d => {
      const name = String(d['子項目名稱'] || '').trim();
      const code = String(d['分類代碼'] || name).trim();
      return `<div class="nav-item" onclick="filterBy('category','${code}'); setActiveItem(this)">
        <span class="nav-item-dot"></span>${name}
      </div>`;
    }).join('');
  }

  buildItems(pathway, 'pathwayList');
  buildItems(exam, 'examList');
}

// 渲染文件區
function renderDocs(docs) {
  const container = document.getElementById('docList');
  if (!docs || docs.length === 0) {
    container.innerHTML = `<div style="color:rgba(255,255,255,0.3);font-size:12px;padding:8px 0;">尚無文件</div>`;
    return;
  }
  container.innerHTML = docs.map(d => {
    const url = String(d['網址'] || '').trim();
    const name = String(d['名稱'] || '').trim();
    const icon = String(d['圖示'] || '📄').trim();
    const tag  = String(d['標籤'] || '').trim();
    return `
    <div class="doc-link" onclick="openDoc('${url}')">
      <span class="doc-link-icon">${icon}</span>
      <span class="doc-link-text">${name}</span>
      ${tag ? `<span class="doc-link-badge">${tag}</span>` : ''}
    </div>`;
  }).join('');
}

// 渲染指定 container 的連結清單（通用）
function renderNavLinks(containerId, links) {
  const container = document.getElementById(containerId);
  if (!container) return;
  if (!links || links.length === 0) {
    container.innerHTML = `<div style="padding:8px 22px 8px 62px;font-size:12px;color:rgba(255,255,255,0.3);">尚無連結</div>`;
    return;
  }
  container.innerHTML = links.map(d => {
    const url  = String(d['網址'] || '').trim();
    const name = String(d['名稱'] || '').trim();
    return `<div class="nav-item" onclick="openDoc('${url}'); setActiveItem(this)">
      <span class="nav-item-dot"></span>${name}
    </div>`;
  }).join('');
}

function renderLinks(links) { renderNavLinks('schoolLinkList', links); }
function renderPsychLinks(links) { renderNavLinks('psychLinkList', links); }

async function fetchAllData(url) {
  let raw;
  try {
    const res = await fetch(url);
    raw = await res.json();
  } catch(e) {
    raw = await loadFromAppsScript(url);
  }
  return parseSheetResponse(raw);
}

async function loadSheetData() {
  const inputUrl = document.getElementById('sheetUrlInput').value.trim();
  const url = inputUrl || APPS_SCRIPT_URL;
  document.getElementById('content').innerHTML = `<div class="loading-wrap"><div class="ldot"></div><div class="ldot"></div><div class="ldot"></div></div>`;
  closeSheetOverlayDirect();
  try {
    const { announcements, docs, links, psychLinks, menuSettings } = await fetchAllData(url);
    allData = announcements.filter(d => d['標題']);
    renderDocs(docs);
    renderLinks(links);
    renderPsychLinks(psychLinks);
    renderMenuSettings(menuSettings);
    if (allData.length === 0) {
      document.getElementById('content').innerHTML = `<div class="empty-state"><div class="empty-emoji">📭</div><h3>試算表目前沒有資料</h3><p>請在 Google Sheets 填入公告內容後重新整理</p><br><button onclick="loadDemo()" style="padding:8px 20px;background:var(--primary);color:#fff;border:none;border-radius:999px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">改用示範資料</button></div>`;
      return;
    }
    renderAll();
  } catch(e) {
    console.error(e);
    document.getElementById('content').innerHTML = `<div class="empty-state"><div class="empty-emoji">⚠️</div><h3>無法載入資料</h3><p>請稍後再試，或點下方使用示範資料</p><br><button onclick="loadDemo()" style="padding:8px 20px;background:var(--primary);color:#fff;border:none;border-radius:999px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">改用示範資料</button></div>`;
  }
}
